name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test -- --coverage
      - run: npm run build

  e2e:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps
      # Se construye SIN token de Mapbox a propósito: en CI el WebGL por software
      # (swiftshader) hace que inicializar mapas reales sature la CPU y dispare el
      # tiempo del job. Sin token, los componentes de mapa renderizan un fallback
      # ligero (ver guards en useMapbox, HeatmapSection y LocationPicker) y los E2E
      # —que no verifican el mapa— corren de forma rápida y determinista.
      - run: npm run build
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
